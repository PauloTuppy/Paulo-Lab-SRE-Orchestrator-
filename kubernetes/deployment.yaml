apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orchestrator-api
  namespace: sre-system
  labels:
    app: infra-orchestrator-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-orchestrator-api
  template:
    metadata:
      labels:
        app: infra-orchestrator-api
    spec:
      serviceAccountName: infra-orchestrator-api-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orchestrator-api
          image: registry.example.com/infra-orchestrator:latest
          command: ["gunicorn", "-w", "4", "-k", "uvicorn.workers.UvicornWorker", "orchestrator.api:app", "--bind", "0.0.0.0:8000"]
          ports:
            - containerPort: 8000
              name: http
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_PATH
              value: /var/lib/incident-db/incident_history.sqlite3
            - name: EXECUTION_MODE
              value: "production"
            - name: WEBHOOK_TOKEN
              value: "prod-secret-token-change-me"
            - name: WANDB_ENABLED
              value: "true"
            - name: WEAVE_ENABLED
              value: "true"
            - name: WANDB_PROJECT
              value: "paulo-lab-sre-orchestrator"
          volumeMounts:
            - name: incident-db
              mountPath: /var/lib/incident-db
            - name: tmp-dir
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: incident-db
          persistentVolumeClaim:
            claimName: incident-db-pvc
        - name: tmp-dir
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orchestrator-worker
  namespace: sre-system
  labels:
    app: infra-orchestrator-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-orchestrator-worker
  template:
    metadata:
      labels:
        app: infra-orchestrator-worker
    spec:
      serviceAccountName: infra-orchestrator-worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orchestrator-worker
          image: registry.example.com/infra-orchestrator:latest
          command: ["python", "-m", "orchestrator.worker"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_PATH
              value: /var/lib/incident-db/incident_history.sqlite3
            - name: EXECUTION_MODE
              value: "production"
            - name: ORCHESTRATOR_ENABLED
              value: "true"
            - name: WANDB_ENABLED
              value: "true"
            - name: WEAVE_ENABLED
              value: "true"
            - name: WANDB_PROJECT
              value: "paulo-lab-sre-orchestrator"
            - name: HISTORIAN_ENDPOINT
              value: "https://seu-endpoint-interno/historian"
            - name: HISTORIAN_DELAY_SEC
              value: "900"
          volumeMounts:
            - name: incident-db
              mountPath: /var/lib/incident-db
            - name: tmp-dir
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: incident-db
          persistentVolumeClaim:
            claimName: incident-db-pvc
        - name: tmp-dir
          emptyDir: {}
