name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'orchestrator/**'
      - 'tests/**'
      - 'kubernetes/**'
      - 'requirements.txt'

jobs:
  validate:
    name: Code Validation and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python Syntax & Compilation
        run: python -m compileall -q orchestrator/

      - name: Validate Kubernetes Manifests
        run: |
          python -c "import yaml, glob; [yaml.safe_load(open(f)) for f in glob.glob('kubernetes/**/*.yaml', recursive=True)]"

      - name: Run Unit and Integration Tests
        run: python -m pytest
        env:
          EXECUTION_MODE: offline

  evaluate:
    name: Weave Evaluation
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weave Evaluation
        run: python -m orchestrator.wandb_eval
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_LLM_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
          EVAL_LLM_MODEL: gemini-2.5-flash

