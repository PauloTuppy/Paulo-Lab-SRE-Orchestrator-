name: Weave Evaluation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'orchestrator/**'
      - 'tests/**'
      - 'requirements.txt'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weave Evaluation
        run: python -m orchestrator.wandb_eval
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_LLM_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
          EVAL_LLM_MODEL: gemini-2.5-flash
